<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marks | Student Academic Management</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-page="marks" data-require-auth="true">
    <div id="navbar"></div>

    <main class="container py-4">
      <div class="mb-3">
        <h1 class="h4 mb-1">Mark Management</h1>
        <div class="text-muted small">Enter marks per student per subject (0 - 100, PASS = 50)</div>
      </div>

      <div class="row g-3 align-items-end mb-3">
        <div class="col-12 col-lg-6">
          <label class="form-label" for="markStudentSelect">Select Student</label>
          <select class="form-select" id="markStudentSelect">
            <option value="">Select...</option>
          </select>
        </div>
        <div class="col-12 col-lg-6 d-flex gap-2">
          <button class="btn btn-primary" id="saveMarksBtn" type="button" disabled>
            Save Marks
          </button>
          <button class="btn btn-outline-secondary" id="reloadMarksBtn" type="button" disabled>
            Reload
          </button>
        </div>
      </div>

      <div id="marksAlert" class="alert d-none" role="alert"></div>

      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-striped mb-0">
            <thead class="table-light">
              <tr>
                <th style="width: 90px">ID</th>
                <th>Subject</th>
                <th style="width: 160px">Mark</th>
                <th style="width: 140px">Status</th>
              </tr>
            </thead>
            <tbody id="marksTbody">
              <tr>
                <td colspan="4" class="text-center text-muted py-4">
                  Select a student to enter marks.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
