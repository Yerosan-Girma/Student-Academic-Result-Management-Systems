<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Students | Student Academic Management</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-page="students" data-require-auth="true">
    <div id="navbar"></div>

    <main class="container py-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h4 mb-1">Student Management</h1>
          <div class="text-muted small">Register and manage student records</div>
        </div>
        <button class="btn btn-primary" id="addStudentBtn" type="button">Add Student</button>
      </div>

      <div id="studentAlert" class="alert d-none" role="alert"></div>

      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-striped mb-0">
            <thead class="table-light">
              <tr>
                <th style="width: 90px">ID</th>
                <th>Name</th>
                <th style="width: 120px">Gender</th>
                <th style="width: 120px">Grade</th>
                <th style="width: 140px">Academic Year</th>
                <th style="width: 120px">Semester</th>
                <th style="width: 160px">Actions</th>
              </tr>
            </thead>
            <tbody id="studentsTbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="studentModalTitle">Add Student</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="studentForm">
            <div class="modal-body">
              <input type="hidden" id="studentId" />

              <div class="mb-3">
                <label class="form-label" for="studentName">Student Name</label>
                <input class="form-control" id="studentName" required />
              </div>

              <div class="mb-3">
                <label class="form-label" for="studentGender">Gender</label>
                <select class="form-select" id="studentGender" required>
                  <option value="">Select</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label" for="studentGrade">Grade</label>
                <input class="form-control" id="studentGrade" placeholder="e.g., Grade 10" required />
              </div>

              <div class="mb-3">
                <label class="form-label" for="academicYear">Academic Year</label>
                <input class="form-control" id="academicYear" placeholder="e.g., 2025/2026" required />
              </div>

              <div class="mb-3">
                <label class="form-label" for="semester">Semester</label>
                <input class="form-control" id="semester" placeholder="e.g., 1" required />
              </div>

              <div id="studentModalAlert" class="alert d-none mb-0" role="alert"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
