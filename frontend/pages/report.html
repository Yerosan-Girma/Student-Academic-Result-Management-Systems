<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports | Student Academic Management</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-page="report" data-require-auth="true">
    <div id="navbar"></div>

    <main class="container py-4 report-shell">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h4 mb-1">Report Generation</h1>
          <div class="text-muted small">Totals, averages, ranks and PASS/FAIL</div>
        </div>
        <button class="btn btn-outline-secondary btn-sm" id="printBtn" type="button" disabled>
          Print
        </button>
      </div>

      <div id="reportAlert" class="alert d-none" role="alert"></div>

      <div class="row g-3">
        <div class="col-12 col-lg-7">
          <div class="card shadow-sm roster-card">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between mb-2 roster-headline">
                <h2 class="h6 mb-0">Class Ranking</h2>
                <button class="btn btn-outline-primary btn-sm" id="refreshReportsBtn" type="button">
                  Refresh
                </button>
              </div>
              <div class="table-responsive">
                <table class="table table-sm table-striped mb-0 roster-table">
                  <thead class="table-light">
                    <tr>
                      <th style="width: 70px">Rank</th>
                      <th style="width: 80px">ID</th>
                      <th>Name</th>
                      <th style="width: 90px">Total</th>
                      <th style="width: 100px">Average</th>
                      <th style="width: 90px">Status</th>
                      <th style="width: 80px">View</th>
                    </tr>
                  </thead>
                  <tbody id="reportSummaryTbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-5">
          <div class="card shadow-sm result-card">
            <div class="card-body">
              <h2 class="h6 mb-3">Student Result Sheet</h2>

              <div class="mb-3">
                <label class="form-label" for="reportStudentSelect">Select Student</label>
                <select class="form-select" id="reportStudentSelect">
                  <option value="">Select...</option>
                </select>
              </div>

              <div id="sheetArea" class="d-none">
                <div class="small text-muted mb-2" id="sheetHeader"></div>
                <div class="table-responsive">
                  <table class="table table-sm mb-2">
                    <thead class="table-light">
                      <tr>
                        <th>Subject</th>
                        <th style="width: 90px">Mark</th>
                        <th style="width: 90px">Result</th>
                      </tr>
                    </thead>
                    <tbody id="sheetMarksTbody"></tbody>
                    <tfoot class="table-light">
                      <tr>
                        <th>Total</th>
                        <th colspan="2" id="sheetTotalCell"></th>
                      </tr>
                      <tr>
                        <th>Average</th>
                        <th colspan="2" id="sheetAvgCell"></th>
                      </tr>
                      <tr>
                        <th>Rank</th>
                        <th colspan="2" id="sheetRankCell"></th>
                      </tr>
                      <tr>
                        <th>Status</th>
                        <th colspan="2" id="sheetStatusCell"></th>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              </div>

              <div id="sheetPlaceholder" class="text-muted small">
                Choose a student to view the report.
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
