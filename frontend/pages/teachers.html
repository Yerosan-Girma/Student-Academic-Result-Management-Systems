<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teachers | Student Academic Management</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-page="teachers" data-require-auth="true">
    <div id="navbar"></div>

    <main class="container py-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h4 mb-1">Teacher Management</h1>
          <div class="text-muted small">Register teachers and assign department / class / role</div>
        </div>
        <button class="btn btn-primary" id="addTeacherBtn" type="button">Add Teacher</button>
      </div>

      <div id="teacherAlert" class="alert d-none" role="alert"></div>

      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-striped mb-0">
            <thead class="table-light">
              <tr>
                <th style="width: 90px">ID</th>
                <th>Name</th>
                <th style="width: 180px">Department</th>
                <th style="width: 160px">Assigned Class</th>
                <th style="width: 180px">Role</th>
                <th style="width: 160px">Actions</th>
              </tr>
            </thead>
            <tbody id="teachersTbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div class="modal fade" id="teacherModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="teacherModalTitle">Add Teacher</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="teacherForm">
            <div class="modal-body">
              <input type="hidden" id="teacherId" />

              <div class="mb-3">
                <label class="form-label" for="teacherName">Teacher Name</label>
                <input class="form-control" id="teacherName" required />
              </div>

              <div class="mb-3">
                <label class="form-label" for="teacherDepartment">Department</label>
                <select class="form-select" id="teacherDepartment">
                  <option value="">(None)</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label" for="teacherRole">Role</label>
                <select class="form-select" id="teacherRole" required>
                  <option value="Subject Teacher">Subject Teacher</option>
                  <option value="Homeroom Teacher">Homeroom Teacher</option>
                </select>
                <div class="form-text">
                  Homeroom Teacher requires an Assigned Class and must be unique per class.
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label" for="assignedClass">Assigned Class</label>
                <input class="form-control" id="assignedClass" placeholder="e.g., Grade 10-A" />
              </div>

              <div id="teacherModalAlert" class="alert d-none mb-0" role="alert"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
