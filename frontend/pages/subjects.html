<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subjects | Student Academic Management</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-page="subjects" data-require-auth="true">
    <div id="navbar"></div>

    <main class="container py-4">
      <div class="mb-3">
        <h1 class="h4 mb-1">Subject Management</h1>
        <div class="text-muted small">Manage departments and subjects (total mark = 100)</div>
      </div>

      <div class="row g-3">
        <div class="col-12 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <h2 class="h6 mb-0">Departments</h2>
              </div>

              <div id="deptAlert" class="alert d-none" role="alert"></div>

              <form id="deptForm" class="d-flex gap-2 mb-3">
                <input
                  class="form-control"
                  id="deptName"
                  placeholder="New department name"
                  required
                />
                <button class="btn btn-outline-primary" type="submit">Add</button>
              </form>

              <div class="table-responsive">
                <table class="table table-sm mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>ID</th>
                      <th>Name</th>
                    </tr>
                  </thead>
                  <tbody id="departmentsTbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-8">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <h2 class="h6 mb-0">Subjects</h2>
            <button class="btn btn-primary btn-sm" id="addSubjectBtn" type="button">
              Add Subject
            </button>
          </div>

          <div id="subjectAlert" class="alert d-none" role="alert"></div>

          <div class="card shadow-sm">
            <div class="table-responsive">
              <table class="table table-striped mb-0">
                <thead class="table-light">
                  <tr>
                    <th style="width: 80px">ID</th>
                    <th>Subject</th>
                    <th style="width: 160px">Department</th>
                    <th style="width: 180px">Teacher</th>
                    <th style="width: 120px">Total Mark</th>
                    <th style="width: 160px">Actions</th>
                  </tr>
                </thead>
                <tbody id="subjectsTbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="subjectModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="subjectModalTitle">Add Subject</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="subjectForm">
            <div class="modal-body">
              <input type="hidden" id="subjectId" />

              <div class="mb-3">
                <label class="form-label" for="subjectName">Subject Name</label>
                <input class="form-control" id="subjectName" required />
              </div>

              <div class="mb-3">
                <label class="form-label" for="subjectDepartment">Department</label>
                <select class="form-select" id="subjectDepartment">
                  <option value="">(None)</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label" for="subjectTeacher">Teacher</label>
                <select class="form-select" id="subjectTeacher">
                  <option value="">(Unassigned)</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label" for="subjectTotalMark">Total Mark</label>
                <input class="form-control" id="subjectTotalMark" value="100" readonly />
              </div>

              <div id="subjectModalAlert" class="alert d-none mb-0" role="alert"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
